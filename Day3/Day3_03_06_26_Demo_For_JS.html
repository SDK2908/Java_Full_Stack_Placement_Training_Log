<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Simple Calculator</title>

    <script>
        function addNumbers() {
            let n1 = document.getElementById("num1").value;
            let n2 = document.getElementById("num2").value;
            let sum = Number(n1) + Number(n2);
            document.getElementById("result").textContent="Addition Result: " + sum;
        }

        function subNumbers() {
            let n1 = document.getElementById("num1").value;
            let n2 = document.getElementById("num2").value;
            let diff = Number(n1) - Number(n2);
            document.getElementById("result").textContent="Subtraction Result: " + diff;
        }

        function mulNumbers() {
            let n1 = document.getElementById("num1").value;
            let n2 = document.getElementById("num2").value;
            let product = Number(n1) * Number(n2);
            document.getElementById("result").textContent="Multiplication Result: " + product;
        }

        function divNumbers() {
            let n1 = document.getElementById("num1").value;
            let n2 = document.getElementById("num2").value;
            let quotient = Number(n1) / Number(n2);
            document.getElementById("result").textContent="Division Result: " + quotient;
        }
    </script>
    <style>
        h1, #num1, #num2 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>JavaScript Simple Calculator</h1>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <br> 
    <br>
    <button onclick="addNumbers()">Add</button>
    <button onclick="subNumbers()">Subtract</button>
    <button onclick="mulNumbers()">Multiply</button>
    <button onclick="divNumbers()">Divide</button>
    <h2 id="result"></h2>
</body>
</html>
