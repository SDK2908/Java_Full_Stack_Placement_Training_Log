<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex and Grid Example</title>
</head>
<style>
    .flex-container {
        display: flex;  /* Enables flexbox layout and it is used in the navbar (only row is used) */
        background-color: red;
        justify-content: space-around;   /* Distributes space around items */
    }
    .flex-container div {
        background-color: aqua;
        margin: 10px;
        padding: 20px;
        font-size: 24px;
    }

    .grid-container {
        display: grid; /* A grid will take the entire screen as width and the height will be determined by the content */
        grid-template-columns: repeat(3, 1fr);     /* 1fr --> Creates 3 equal columns in the total space of grid */
        grid-template-rows: 100px 100px; /* Creates 2 rows of 100px height */
        grid-gap: 10px; /* Adds a gap between grid items */
        align-items: center; /* Aligns items vertically in the center */
        justify-items: center; /* Aligns items horizontally in the center */
        justify-content: space-around; /* Centers the entire grid horizontally within its container */
        row-gap: 20px; /* Adds a gap between rows */
        background-color: red;
    }

    .grid-container div {
        background-color: aqua;
        padding: 20px;
        font-size: 24px;
    }
</style>
<body>
    <h1 align="center">Flex & Grid</h1>
    <h3>Flexbox Example</h3>
    <div class="flex-container">
        <div>Flex Item 1</div>
        <div>Flex Item 2</div>
        <div>Flex Item 3</div>
    </div>

    <br>
    <br>
    <h3>Grid Example</h3>
    <div class="grid-container">
        <div>Grid Item 1</div>
        <div>Grid Item 2</div>
        <div>Grid Item 3</div>
        <div>Grid Item 4</div>
        <div>Grid Item 5</div>
        <div>Grid Item 6</div>
        <div>Grid Item 7</div>
    </div>
</body>
</html>
