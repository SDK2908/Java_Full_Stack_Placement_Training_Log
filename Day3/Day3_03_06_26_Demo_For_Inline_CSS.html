```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS Demo</title>

    <style>

        body{
            background-color: beige;
            margin: 20px;
            padding: 20px;
            border: 4px solid gray;
            border-radius: 15px;
        }

        header, footer {
            background-color: lightblue;
            text-align: center;
            color: blue;

            width: 100%;
            height: 80px;
            margin: 10px 0;
            padding: 15px;

            border-width: 3px;
            border-style: solid;
            border-color: navy;
            border-radius: 10px;
        }

        h1 {
            color: red;
            text-align: center;

            margin: 15px;
            padding: 10px;

            border: 2px dashed red;
            border-radius: 10px;
        }

        p {
            color: red;
            text-align: center;

            margin: 15px;
            padding: 10px;

            border: 2px dotted orange;
            border-radius: 10px;
        }

        table {
            background-color: #f0f0f0;

            width: 300px;
            margin: 20px auto;
            padding: 10px;

            border-width: 3px;
            border-style: double;
            border-color: black;
            border-radius: 10px;
        }

        th {
            background-color: lightgreen;

            padding: 10px;

            border: 2px solid green;
            border-radius: 5px;
        }

        td {
            background-color: white;

            padding: 10px;

            border: 1px dashed black;
            border-radius: 5px;
        }

        form {
            width: 300px;
            margin: 20px auto;
            padding: 20px;

            border-width: 3px;
            border-style: dashed;
            border-color: green;
            border-radius: 15px;

            background-color: #f9f9f9;
        }

        label {
            color: green;
            display: block;

            margin-top: 10px;
        }

        input, textarea {
            width: 200px;
            height: 30px;

            margin: 5px;
            padding: 5px;

            border-width: 2px;
            border-style: dotted;
            border-color: black;
            border-radius: 10px;

            color: blueviolet;
        }

        textarea {
            width: 200px;
            height: 70px;
        }

        marquee {
            color: purple;

            margin: 20px;
            padding: 10px;

            border-width: 2px;
            border-style: groove;
            border-color: red;
            border-radius: 10px;

            background-color: pink;
        }

    </style>
</head>

<body>

    <header>
        <h1>Welcome to Classic HTML</h1>
    </header>

    <h1>We love super bikes ❤️</h1>

    <p>This page demonstrates old school HTML with inline CSS.</p>

    <table border="1" cellpadding="5" cellspacing="0">

        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>

        <tr>
            <td>John Doe</td>
            <td>30</td>
        </tr>

    </table>

    <form>

        <label>Name:</label>
        <input type="text">

        <label>DOB:</label>
        <input type="date">

        <label>Email:</label>
        <input type="email">

        <label>Contact No:</label>
        <input type="number">

        <label>Address:</label>
        <textarea></textarea>

    </form>

    <marquee>
        Scrolling text in HTML4!
    </marquee>

    <footer>
        &copy; All rights reserved.
    </footer>

</body>
</html>
```
