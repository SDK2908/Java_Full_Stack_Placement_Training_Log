<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors Example</title>
</head>
<style>
    h1{
        background-color: aliceblue;    /*Element Selector */
    }
    #sdk{
        color: aqua;                /* id Selector and this id should be unique*/
    }
    .sk{
        color:blue;             /* class Selector */
    }
    *{
        font-weight: 900;               /* universal Selector */
    }
</style>
<body>
    <h1>Element Selector</h1>
    <p id="sdk">Id Selector</p>
    <p class="sk">Class Selector</p>
    <h2>This is H2</h2>
    <h5>This is H5</h5>
</body>
</html>
