<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add 2 Numbers</title>
</head>
<body>
    <h1>Add 2 Numbers</h1>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
   <!-- <button onclick="addNumbers()">Add</button> -> for the without return value and without parameters -->
    <button onclick="Display()">Add</button>
    <h2 id="result"></h2>
    <script>
        /*function addNumbers() {   //this is without return value and without parameters
            let n1 = document.getElementById("num1").value;
            let n2 = document.getElementById("num2").value;
            let sum = Number(n1) + Number(n2);
            document.getElementById("result").textContent="Addition Result: " + sum;
        }*/
       function Display() { //this function is without return value and without parameters
           let n1 = document.getElementById("num1").value;
           let n2 = document.getElementById("num2").value;
           let ans = addNumbers(n1,n2);
           document.getElementById("result").textContent="Result: " + ans;
       }
       function addNumbers(n1, n2) {  //this function is with return value and with parameters
           let sum = Number(n1) + Number(n2);
           return sum;
       }
    </script>
</body>
</html>
