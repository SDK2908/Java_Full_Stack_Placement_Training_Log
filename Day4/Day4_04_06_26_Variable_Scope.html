<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Scope Array</title>
</head>
<script>
    let a = [1,2,3]
    console.log(a);
    console.log(a[0]);
    for(let i=0; i<a.length; i++){
        console.log(a[i]);
    }
</script>
<body>
    <h1>Variable Scope</h1>
</body>
</html>
