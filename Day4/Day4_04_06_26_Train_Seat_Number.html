<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printing Seat (Lower, Upper, Middle, Side Upper, Side Lower) in a 3rd class from the input of seat number. There are 10 compartments in one couch. There is only one couch. There are 8 seats in a compartment</title>
</head>
<script>
    function classSelect(){
        let seatNumber = document.getElementById("seatNumber").value;
        let classNumber = document.getElementById("classNumber").value;
        if (classNumber < 1 || classNumber > 3) {
            document.getElementById("result").textContent = "Please enter a valid class number between 2 and 3";
            return;
        }
        else if(seatNumber < 1 || seatNumber > 80){
            document.getElementById("result").textContent = "Please enter a valid seat number between 1 and 80.";
            return;
        }
        else{
            if(classNumber==3){
                return findSeat()
            }
            else{
                return findSeat2()
            }
        }
    }
    function findSeat() {
        let seatNumber = Number(document.getElementById("seatNumber").value);
        if (seatNumber < 1 || seatNumber > 80) {
            document.getElementById("result").textContent = "Please enter a valid seat number between 1 and 80.";
            return;
        }
        seatNumber = seatNumber % 8;
        //we can divide the input number with 8 and if the remainder is a number we can assign it from the list. the list will be 1,4-lower; 2,5-middle; 3,6-upper; 7-side lower; 8-side upper
        if(seatNumber===1 || seatNumber===4){
            document.getElementById("result").textContent = "The assigned seat: Lower";
        }
        else if(seatNumber===2 || seatNumber===5){
            document.getElementById("result").textContent = "The assigned seat: Middle";
        }
        else if(seatNumber===3 || seatNumber===6){
            document.getElementById("result").textContent = "The assigned seat: Upper";
        }
        else if(seatNumber===7){
            document.getElementById("result").textContent = "The assigned seat: Side Lower";
        }
        else if(seatNumber===0){
            document.getElementById("result").textContent = "The assigned seat: Side Upper";
        }
    }
    function findSeat2() {
        let seatNumber = Number(document.getElementById("seatNumber").value);
        if (seatNumber < 1 || seatNumber > 60) {
            document.getElementById("result").textContent = "Please enter a valid seat number between 1 and 60.";
            return;
        }
        seatNumber = seatNumber % 6;
        //we can divide the input number with 6 and if the remainder is a number we can assign it from the list. In 2AC we will have 6 seats in a compartment and middle will not be there.
        if(seatNumber===1 || seatNumber===3){
            document.getElementById("result").textContent = "The assigned seat: Lower";
        }

        else if(seatNumber===2 || seatNumber===4){
            document.getElementById("result").textContent = "The assigned seat: Upper";
        }
        else if(seatNumber===5){
            document.getElementById("result").textContent = "The assigned seat: Side Lower";
        }
        else if(seatNumber===0){
            document.getElementById("result").textContent = "The assigned seat: Side Upper";
        }
    }
</script>
<body>
    <h1>Train Seat Number</h1>
    <input type="number" id="seatNumber" placeholder="Enter seat number (1-80)">
    <input type="number" id="classNumber" placeholder="Enter class number (2 or 3)">
    <button onclick="classSelect()">Find Seat</button>
    <p id="result"></p>
</body>
</html>
